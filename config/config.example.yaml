assistant:
  name: "daily-os-feishu"
  language: "zh-CN"
  tone: "calm, direct, practical"

user:
  display_name: "User"
  timezone: "America/Toronto"

llm:
  provider: "codex" # codex | openai | claude
  model: "default" # codex/claude: 'default' uses the CLI account's model; openai: an API model id

workflows:
  daily_plan:
    enabled: true
    time: "08:00"
  daily_review:
    enabled: true
    time: "21:30"
    # On the weekly review day, skip the automatic daily review.
    # Users can still trigger it manually with `daily-os review`.
    skip_on_weekly_review_day: true
  weekly_review:
    enabled: true
    weekday: "SUN"
    time: "20:00"

planning:
  strategy_alignment:
    enabled: true
    # The source that should anchor daily planning before Linear/tasks are selected.
    # Put private document names or table markers only in your local config/config.yaml.
    primary_source_hint: "Primary weekly planning source"
    primary_labels: ["weekly priorities", "每周要务"]
    primary_markers: []
    reference_labels: []
    reference_markers: []
    alignment_heading: "策略对齐"
    # These sources refine execution, but should not override the primary strategy source.
    reference_sources: ["linear", "vault", "feishu", "calendar", "github"]

calendar:
  enabled: false
  engine:
    # auto uses calendar-planning-os when installed, otherwise the built-in draft-only engine.
    # external requires calendar-planning-os; builtin never writes to a real calendar.
    mode: "auto" # auto | external | builtin
    command: "node"
    cli_path: "bin/calendar-planning-os.mjs"
    workdir: "../calendar-planning-os"
    # Local-only files; leave empty unless you have created them on this machine.
    policy_file: ""
    routines_file: ""
    timeout_ms: 120000
    input_path: "./data/runtime/calendar-draft-input.json"
  draft:
    week_days: 5
    max_tasks: 8

service:
  prevent_sleep:
    # Uses macOS `caffeinate -i` while `npm run start` or the launchd service is running.
    # Closing a MacBook lid, especially on battery, can still force sleep.
    enabled: false

output:
  feishu:
    enabled: true
    provider: "auto" # auto | sdk | lark_cli
    identity: "bot" # bot | user
    chat_id_env: "FEISHU_CHAT_ID"
    send_mode: "markdown" # markdown | text

feedback:
  feishu:
    enabled: false
    identity: "bot" # bot | user
    chat_id_env: "FEISHU_CHAT_ID"
    command_prefix: "daily-os"
    poll_limit: 20
    state_path: "./data/memory/feishu-feedback-state.json"
    log_path: "./data/memory/feishu-feedback.md"

interaction:
  feishu:
    enabled: false
    command_prefix: "daily-os"
    require_mention_in_groups: true
    debounce_ms: 600
    reply_mode: "markdown" # markdown | text
    session_catalog_path: "./data/memory/feishu-session-catalog.json"
    agent_mode:
      enabled: false
      workdir: "" # Empty uses the current project root. Set a trusted workspace before enabling write-capable modes.
      sandbox: "read-only" # read-only | workspace-write | danger-full-access
      include_memory: true
      # include_evidence=false keeps raw evidence out of the Codex prompt.
      # context_pack below still passes a compact, decision-ready evidence summary.
      include_evidence: false
      context_pack:
        enabled: true
        include_latest_workflow: true
        include_progress_ledger: true
        include_decision_policy: true
        include_evidence_summary: true
        max_sources: 12
        max_items_per_source: 4
        max_chars_per_item: 900
      timeout_ms: 300000
    security:
      # Safe default: interaction messages are denied until one owner/user/chat rule is configured.
      owner_open_id_env: "FEISHU_OWNER_OPEN_ID"
      admin_open_ids: []
      allowed_user_open_ids: []
      allowed_chat_ids: []
      access_level: "read_only" # read_only blocks arbitrary workspace writes; workspace/full require tighter trust.
      allowed_workspaces: [] # Required before future workspace-write agent actions can run with access_level=workspace.

decision:
  enabled: true
  # Stored inside memory.repository_path, or the built-in memory vault when repository_path is empty.
  policy_file: "decision-policy.yaml"
  policy_notes_file: "decision-policy.md"
  candidates_path: "./data/memory/decision-policy-candidates.md"
  onboarding:
    enabled: true
    chat_name: "Daily OS - 决策校准"
    chat_id_env: "DAILY_OS_DECISION_CHAT_ID"
    owner_open_id_env: "FEISHU_OWNER_OPEN_ID"
    state_path: "./data/memory/decision-onboarding.json"
    # Keep false for safety: users should click Start onboarding or run the CLI command.
    auto_create_on_setup: false

progress:
  enabled: true
  ledger_dir: "./data/memory/progress"
  no_progress_reminder_time: "16:30"
  max_candidates: 12

todo_inbox:
  enabled: true
  # Machine-readable status ledger. Keep this local and private.
  ledger_path: "./data/memory/todo-inbox.jsonl"
  # Empty means: use sources.vault.local_path + vault_relative_path when local Vault is enabled.
  vault_path: ""
  # User-readable Markdown note inside the user's Vault knowledge base.
  vault_relative_path: "99_Meta/daily-os-todo.md"

chat_analysis:
  enabled: true
  # manual: latest configured messages
  # todo: yesterday 00:00 -> today's daily_plan time
  # review: today's daily_plan time -> now / daily_review time
  default_mode: "manual" # manual | todo | review
  max_messages: 80
  max_suggestions: 8

background_suggestions:
  # Runs from the macOS launchd service / `npm run start` scheduler.
  # It only stores run status, counts, errors, and a hashed signature; suggestion bodies and evidence stay out of logs/state.
  enabled: false
  mode: "review" # manual | todo | review
  interval_minutes: 120
  min_confidence: "medium" # low | medium | high
  send_to_feishu: true
  send_on_change_only: true
  state_path: "./data/memory/background-suggestions-state.json"
  pending_path: "./data/memory/background-suggestions-pending.json"
  pending_ttl_hours: 24

sources:
  # User knowledge-base vault used as an evidence source.
  # This is separate from memory.repository_path below.
  vault:
    enabled: false
    provider: "local" # local | remote
    local_path: "/path/to/Private-Vault"
    remote:
      base_url_env: "VAULT_GATE_URL"
      token_env: "VAULT_GATE_TOKEN"
      scan:
        # Used by both remote vault-gate scan and local Vault markdown scan.
        # Local scan also ranks candidates against confirmed decision policy terms.
        enabled: true
        statuses: ["active", "watching", "considering"]
        due_within_days: 7
        limit: 12
      read_paths:
        todos: "99_Meta/todos.md"
        routing: "99_Meta/routing.md"
        watch_list: "99_Meta/watch-list.md"

  chrome_snapshot:
    enabled: false
    tabs_path: "./data/snapshots/chrome/current-tabs.txt"
    status_path: "./data/snapshots/chrome/status.json"
    tabs_json_path: "./data/snapshots/chrome/tabs.json"
    capture:
      enabled: true
      method: osascript
      refresh_on_collect: true
      background_interval_minutes: 15
      timeout_ms: 5000
      max_tabs: 80
      include_url_query: false
      allowlist: []
      blocklist: []

  apple_calendar_snapshot:
    enabled: false
    path: "./data/snapshots/calendar/apple-today.json"

  feishu:
    enabled: true
    profiles:
      - id: "work"
        label: "Work"
        identity: "user" # user | bot
        enabled: true
        calendar:
          enabled: true
          days: 1
        tasks:
          enabled: true
          include_completed: false
          page_limit: 5
        docs:
          enabled: false
          documents: []
        im_history:
          enabled: false
          chat_id_env: "FEISHU_CHAT_ID"
          limit: 80
    calendar:
      enabled: true
      days: 1
    tasks:
      enabled: true
      include_completed: false
      page_limit: 5
    docs:
      enabled: false
      documents:
        - name: "weekly"
          token: "YOUR_DOCX_TOKEN"
    im_history:
      enabled: false
      chat_id_env: "FEISHU_CHAT_ID"
      limit: 80

  github:
    enabled: false
    repositories: []
    per_repo_limit: 20

  linear:
    enabled: false
    query: "assignee = me and state.type != 'completed'"
    projects_allowlist: []
    projects_blocklist: []
    teams_allowlist: []
    teams_blocklist: []

  local_files:
    enabled: false
    files:
      - name: "custom"
        path: "./data/snapshots/custom.txt"

memory:
  # Daily OS working memory repository.
  # Empty means use the generic repository shipped at ./memory-vault/default.
  # Set this to a private Daily OS memory vault folder when deploying for a real user.
  # This is separate from sources.vault.local_path above.
  repository_path: ""
  long_term_path: "./data/memory/long-term.md"
  daily_dir: "./data/memory/daily"
  workflow_runs_dir: "./data/memory/workflow-runs"

skills:
  # Optional local skill bridge. Real skill configs, document tokens, and
  # user-specific paths belong in the skill's own ignored config.yaml, not here.
  enabled: false
  inputs_dir: "./data/memory/skill-inputs"
  registry:
    - id: "weekly-review"
      provider: "auto" # auto | codex | claude
      path: "~/.codex/skills/weekly-review/SKILL.md"
      workdir: "~/.codex/skills/weekly-review"
      default_mode: "weekly"
      effects: ["read", "draft", "feishu_write"]
      require_confirmation_for: ["feishu_write"]
