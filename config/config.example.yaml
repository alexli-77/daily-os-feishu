assistant:
  name: "daily-os-feishu"
  language: "zh-CN"
  tone: "calm, direct, practical"

user:
  display_name: "User"
  timezone: "America/Toronto"

llm:
  provider: "codex" # codex | openai
  model: "default" # default uses the local Codex CLI account's supported model

workflows:
  daily_plan:
    enabled: true
    time: "08:00"
  daily_review:
    enabled: true
    time: "21:30"
  weekly_review:
    enabled: true
    weekday: "SUN"
    time: "20:00"

output:
  feishu:
    enabled: true
    identity: "bot" # bot | user
    chat_id_env: "FEISHU_CHAT_ID"
    send_mode: "markdown" # markdown | text

feedback:
  feishu:
    enabled: false
    identity: "bot" # bot | user
    chat_id_env: "FEISHU_CHAT_ID"
    command_prefix: "daily-os"
    poll_limit: 20
    state_path: "./data/memory/feishu-feedback-state.json"
    log_path: "./data/memory/feishu-feedback.md"

interaction:
  feishu:
    enabled: false
    command_prefix: "daily-os"
    require_mention_in_groups: true
    debounce_ms: 600
    reply_mode: "markdown" # markdown | text
    security:
      # Safe default: interaction messages are denied until one owner/user/chat rule is configured.
      owner_open_id_env: "FEISHU_OWNER_OPEN_ID"
      admin_open_ids: []
      allowed_user_open_ids: []
      allowed_chat_ids: []
      access_level: "read_only" # read_only | workspace | full
      allowed_workspaces: []

sources:
  # User knowledge-base vault used as an evidence source.
  # This is separate from memory.repository_path below.
  vault:
    enabled: false
    provider: "local" # local | remote
    local_path: "/path/to/Private-Vault"
    remote:
      base_url_env: "VAULT_GATE_URL"
      token_env: "VAULT_GATE_TOKEN"
      scan:
        enabled: true
        statuses: ["active", "watching", "considering"]
        due_within_days: 7
        limit: 12
      read_paths:
        todos: "99_Meta/todos.md"
        routing: "99_Meta/routing.md"
        watch_list: "99_Meta/watch-list.md"

  chrome_snapshot:
    enabled: false
    tabs_path: "./data/snapshots/chrome/current-tabs.txt"
    status_path: "./data/snapshots/chrome/status.json"

  apple_calendar_snapshot:
    enabled: false
    path: "./data/snapshots/calendar/apple-today.json"

  feishu:
    enabled: true
    profiles:
      - id: "work"
        label: "Work"
        identity: "user" # user | bot
        enabled: true
        calendar:
          enabled: true
          days: 1
        tasks:
          enabled: true
          include_completed: false
          page_limit: 5
        docs:
          enabled: false
          documents: []
        im_history:
          enabled: false
          chat_id_env: "FEISHU_CHAT_ID"
          limit: 30
    calendar:
      enabled: true
      days: 1
    tasks:
      enabled: true
      include_completed: false
      page_limit: 5
    docs:
      enabled: false
      documents:
        - name: "weekly"
          token: "YOUR_DOCX_TOKEN"
    im_history:
      enabled: false
      chat_id_env: "FEISHU_CHAT_ID"
      limit: 30

  github:
    enabled: false

  linear:
    enabled: false
    query: "assignee = me and state.type != 'completed'"
    projects_allowlist: []
    projects_blocklist: []
    teams_allowlist: []
    teams_blocklist: []

  local_files:
    enabled: false
    files:
      - name: "custom"
        path: "./data/snapshots/custom.txt"

memory:
  # Daily OS working memory repository.
  # Empty means use the generic repository shipped at ./memory-vault/default.
  # Set this to a private Daily OS memory vault folder when deploying for a real user.
  # This is separate from sources.vault.local_path above.
  repository_path: ""
  long_term_path: "./data/memory/long-term.md"
  daily_dir: "./data/memory/daily"
