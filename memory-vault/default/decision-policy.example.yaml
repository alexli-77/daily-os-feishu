version: 1
updated_at: '2026-06-18T16:21:25.373Z'
status: active
rules:
  - id: confirm-before-durable-policy-change
    description: 长期决策规则必须先由用户确认，才能保存生效。
    when:
      event: policy_change_proposed
    then:
      require_confirmation: true
      bucket: pending_policy_candidate
  - id: todo-review-use-weekly-cutto-sources
    status: active
    description: 做 todo 分流和复盘时，应优先参考用户飞书文档 Weekly 中的每周要务，并结合 Cutto 飞书内容与 Cutto Linear 任务状态判断优先级和进展。
    applies_to:
      - todo
      - daily_review
      - weekly_review
    when:
      触发条件: 用户请求 todo 分流、日复盘或周复盘
    then:
      执行方式: 先查看飞书文档 Weekly，重点参考其中的每周要务；再结合 Cutto 飞书的聊天记录、文档等上下文，以及 Cutto Linear 的任务和项目状态，综合判断任务优先级、遗漏事项和复盘结论。
    reason: 这会长期影响 Daily OS 在 todo 分流和 review 中使用哪些信息源、如何判断优先级和如何校准周目标，属于可复用的决策规则，需要用户确认后才能保存。
    created_at: '2026-06-15T23:39:41.857Z'
    confirmed_at: '2026-06-16T04:42:45.302Z'
  - id: weekly-first-for-todo-review-priority
    status: active
    description: >-
      生成 todo、daily review、weekly review 时，Daily OS 必须优先参考 Feishu Weekly 文档中的“每周要务”作为主策略来源；其他 Cutto 相关数据源用于辅助校准，不能覆盖
      Weekly 主策略。
    applies_to:
      - todo
      - daily_review
      - weekly_review
    when:
      触发条件: 用户请求生成 todo、daily review 或 weekly review
    then:
      执行方式: >-
        先读取 Feishu Weekly 文档中的“每周要务”并作为优先级主策略；再结合 Cutto 飞书任务、飞书日历、Cutto 相关 IM history、已配置的 Feishu Docs / 智能纪要文档，以及 Cutto
        Linear 判断优先级和进展；Linear 只作为执行状态和任务池参考，不能覆盖 Weekly 主策略；智能纪要如果未能通过 Docs 或 Minutes 数据源成功读取，必须明确说明未参考，不得假装已参考。
    reason: 这会长期影响 Daily OS 在 todo 分流、日复盘和周复盘中如何选择信息源、如何判断优先级，以及如何处理 Linear 与 Weekly 之间的冲突，属于可复用的决策规则，需要用户确认后才能保存。
    created_at: '2026-06-16T14:08:46.776Z'
    confirmed_at: '2026-06-16T14:08:59.113Z'
  - id: daily-progress-confirm-linear-real-today-tasks
    status: active
    description: 每日进展确认时，必须真实抓取 Linear 数据，只查看用户名为「张篛」的当天任务，不抓取他人任务或其他日期任务；若数据未成功抓取，必须明确说明，不能猜测或编造。
    applies_to:
      - daily_review
    when:
      触发条件: 用户请求每日进展确认或 daily review 中的今日进展核对
    then:
      执行方式: 按用户所在时区判断当天日期；从 Linear 真实读取用户名为「张篛」的任务数据；只筛选当天任务；排除其他用户和其他日期；如果 Linear 数据未成功读取，明确说明未读取成功，不用推测替代真实数据。
    reason: 这会长期影响 Daily OS 每日进展确认的数据来源、任务归属筛选和日期筛选方式，能避免用错误日期、错误负责人或非真实数据做复盘判断。
    created_at: '2026-06-16T23:12:46.221Z'
    confirmed_at: '2026-06-16T23:16:20.075Z'
  - id: daily-todo-feishu-first-urgent-check
    status: active
    description: >-
      生成每天 todo 或 daily plan 时，应优先参考 Feishu Weekly 🐧 每周要务、@用户的飞书消息、会议纪要文档、单独话题群聊天记录和会议安排，不只依赖 Linear；需要从 Feishu
      内容中提取当天最紧急的关键问题，并在计划末尾询问用户是否有额外紧急事项。
    applies_to:
      - daily_plan
      - todo
    when:
      触发条件: 用户请求生成每日 todo、daily plan 或当天任务安排
    then:
      执行方式: >-
        先读取 Feishu Weekly 🐧 每周要务、@用户的飞书消息、会议纪要、单独话题群聊天记录和会议安排；根据昨天会议纪要和 Feishu 消息提取关键问题与最紧急事项；Linear 只作为任务状态参考，不能替代
        Feishu 上下文判断；提醒用户当天是否有 Weekly 中对应安排；最后询问用户今天是否还有紧急事项需要加入。
    reason: 这会长期影响 Daily OS 每天生成 todo 时的信息源优先级、紧急事项判断方式，以及是否主动向用户补问临时紧急安排，属于可复用的决策规则，需要用户确认后才能保存。
    created_at: '2026-06-18T14:59:47.627Z'
    confirmed_at: '2026-06-18T15:04:15.232Z'
  - id: today-tasks-use-feishu-not-linear-time
    status: active
    description: 判断当天任务时，不依赖 Linear 上的时间字段；当天任务的日期、紧急性和是否应进入今日计划，只以 Feishu 数据为准。
    applies_to:
      - daily_plan
      - todo
      - daily_review
    when:
      触发条件: 用户请求生成当天 todo、daily plan，或核对当天任务进展
    then:
      执行方式: 优先读取 Feishu 的 Weekly、飞书消息、会议纪要、话题群聊天记录和日程来判断当天任务；Linear 只作为任务池、任务状态和执行进展参考，不使用 Linear 时间字段决定任务是否属于当天
    reason: Linear 上的时间不准确，如果用它判断当天任务，会直接影响 daily plan、todo 分流和 daily review 的优先级判断，属于需要长期固定的数据源决策规则。
    created_at: '2026-06-18T16:21:13.448Z'
    confirmed_at: '2026-06-18T16:21:25.373Z'
