name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gate:
    name: verify gate
    runs-on: ubuntu-latest
    env:
      # Skip Codex/Claude agent-backed cases; CI has no subscription CLI.
      DAILY_OS_SKIP_AGENT_TESTS: '1'
      DAILY_OS_SKIP_AGENT_SMOKE: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # regression tests load config/config.yaml (gitignored); seed it from the example.
      - name: Seed config
        run: cp config/config.example.yaml config/config.yaml

      # typecheck + build + privacy:scan + license:check + regression:test
      - name: Verify (typecheck, build, privacy, license, regression)
        run: npm run verify

      - name: Alpha smoke
        run: npm run alpha:smoke:ci
