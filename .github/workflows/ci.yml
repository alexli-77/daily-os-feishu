name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  typecheck:
    name: typecheck and alpha smoke
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI smoke checks
        run: npm run alpha:smoke:ci
